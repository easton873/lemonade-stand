<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lemonade Stand</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --y:#F5C518;--yl:#FFFDE7;--yd:#c8a000;
  --g:#4CAF50;--gd:#2E7D32;
  --r:#E53935;--o:#F57C00;--b:#1976D2;
  --txt:#1a1a1a;--muted:#666;
  --card:#fff;--bg:#FFFDE7;--border:#e0e0e0;
  --sh:0 2px 10px rgba(0,0,0,.08);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh}
#app{max-width:720px;margin:0 auto;padding:16px}

/* HEADER */
.hdr{background:var(--y);border-radius:12px;padding:12px 16px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;box-shadow:var(--sh)}
.hdr-title{font-size:1.25rem;font-weight:800}
.hdr-stats{display:flex;gap:8px;flex-wrap:wrap}
.stat{background:rgba(255,255,255,.5);padding:3px 10px;border-radius:20px;font-size:.85rem;font-weight:700}

/* CARDS */
.card{background:var(--card);border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:var(--sh);border:1px solid var(--border)}
.card-title{font-weight:700;font-size:.95rem;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}

/* BUTTONS */
.btn{border:none;border-radius:8px;cursor:pointer;font-weight:700;font-size:.95rem;padding:10px 18px;transition:all .15s}
.btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-y{background:var(--y);color:var(--txt)}
.btn-g{background:var(--g);color:#fff}
.btn-r{background:var(--r);color:#fff}
.btn-w{background:#f4f4f4;color:var(--txt)}
.btn-full{width:100%;margin-top:8px;padding:14px;font-size:1.05rem}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* WEATHER */
.wx-card{text-align:center;padding:12px 8px}
.wx-icon{font-size:2.5rem}
.wx-name{font-weight:700;font-size:1rem;margin-top:4px}
.wx-temp{color:var(--muted);font-size:.85rem}
.wx-desc{color:var(--muted);font-size:.8rem;margin-top:2px}
.demand-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.75rem;font-weight:700;margin-top:6px}
.d-vhigh{background:#FFCDD2;color:#B71C1C}
.d-high{background:#FFF9C4;color:#F57F17}
.d-med{background:#E8F5E9;color:#1B5E20}
.d-low{background:#E3F2FD;color:#0D47A1}
.d-vlow{background:#EDE7F6;color:#4527A0}

/* SHOP */
.ing-row{padding:10px 0;border-bottom:1px solid var(--border)}
.ing-row:last-child{border-bottom:none}
.ing-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.ing-icon{width:38px;height:38px;background:var(--yl);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0}
.ing-info{flex:1;min-width:0}
.ing-name{font-weight:600;font-size:.9rem}
.ing-detail{font-size:.78rem;color:var(--muted)}
.ing-ctrl{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.qbtn{min-width:26px;height:26px;padding:0 5px;border:2px solid var(--y);background:#fff;border-radius:6px;cursor:pointer;font-size:.82rem;font-weight:700;display:flex;align-items:center;justify-content:center}
.qbtn:hover{background:var(--yl)}
.qbtn-reset{border-color:var(--border);color:var(--muted)}
.qbtn-reset:hover{background:#f4f4f4;border-color:#bbb}
.qdsp{min-width:36px;text-align:center;font-weight:700;font-size:.9rem}
.qty-inp{width:54px;height:26px;padding:0 4px;border:2px solid var(--border);border-radius:6px;text-align:center;font-size:.85rem;font-weight:700}
.qty-inp:focus{border-color:var(--y);outline:none}
.bulk-badge{display:inline-block;background:#E8F5E9;color:#1B5E20;border-radius:10px;padding:1px 7px;font-size:.72rem;font-weight:700}

/* ADVERTISING */
.ad-list{display:flex;flex-direction:column;gap:3px;max-height:320px;overflow-y:auto;padding-right:2px}
.ad-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:background .12s;border:2px solid transparent}
.ad-row:hover:not(.ad-locked){background:var(--yl)}
.ad-row.ad-sel{background:var(--yl);border-color:var(--y)}
.ad-row.ad-locked{opacity:.38;cursor:default}
.ad-dot{width:16px;height:16px;border:2px solid var(--border);border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.6rem}
.ad-sel .ad-dot{background:var(--y);border-color:var(--yd)}
.ad-icon{font-size:1.2rem;width:26px;text-align:center;flex-shrink:0}
.ad-info{flex:1;min-width:0}
.ad-name{font-weight:600;font-size:.87rem}
.ad-desc{font-size:.75rem;color:var(--muted)}
.ad-right{text-align:right;flex-shrink:0;min-width:64px}
.ad-cost{font-weight:700;font-size:.85rem}
.ad-boost{font-size:.73rem;color:var(--gd)}

/* INVENTORY */
.inv-row{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:.88rem}
.inv-qty{font-weight:700;min-width:28px}
.inv-exp{margin-left:auto;font-size:.78rem;color:var(--muted)}
.exp-warn{color:var(--o);font-weight:600}
.exp-crit{color:var(--r);font-weight:600}
.inv-total-row{font-weight:700;border-bottom:1px dashed var(--border);padding-bottom:6px !important;margin-bottom:2px}
.inv-batch-row{padding-left:22px;opacity:.85}

/* RECIPE */
.recipe-row{display:flex;align-items:center;justify-content:center;gap:18px;padding:10px 0;flex-wrap:wrap}
.recipe-ing{display:flex;flex-direction:column;align-items:center;gap:5px}
.recipe-icon{font-size:1.6rem;line-height:1}
.recipe-ctrl{display:flex;align-items:center;gap:6px}
.recipe-num{font-size:1.3rem;font-weight:800;min-width:28px;text-align:center;color:var(--yd)}
.recipe-lbl{font-size:.73rem;color:var(--muted);text-align:center}
.recipe-sep{font-size:1.3rem;color:var(--muted);align-self:center;margin-top:-14px}
.recipe-quality{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--border);gap:8px;flex-wrap:wrap}

/* PRICE */
.price-row{display:flex;align-items:center;gap:10px;margin-top:8px}
.price-inp{width:72px;padding:7px;border:2px solid var(--border);border-radius:8px;font-size:1.1rem;font-weight:700;text-align:center}
.price-inp:focus{border-color:var(--y);outline:none}
.price-hint{font-size:.82rem;flex:1}
.quick-prices{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.quick-prices .btn{padding:5px 12px;font-size:.82rem}

/* CUPS CAN MAKE */
.cups-box{background:var(--yl);border:2px solid var(--y);border-radius:10px;padding:12px;text-align:center;margin-bottom:10px}
.cups-num{font-size:2.2rem;font-weight:800;color:var(--yd);line-height:1}
.cups-lbl{font-size:.82rem;color:var(--muted);margin-top:2px}

/* SIMULATION */
.sim-wrap{text-align:center;padding:32px 16px}
.sim-title{font-size:1.4rem;font-weight:700;margin-bottom:16px}
.prog-bar{height:18px;background:var(--border);border-radius:9px;overflow:hidden;margin:14px 0}
.prog-fill{height:100%;background:var(--y);border-radius:9px;transition:width .08s linear}
.sim-count{font-size:3.5rem;font-weight:800;color:var(--gd);line-height:1;margin:16px 0 4px}
.sim-time{font-size:.9rem;color:var(--muted);height:20px}
.sim-msg{font-size:.88rem;color:var(--muted);height:20px;margin-top:8px}

/* SUMMARY */
.sum-hero{text-align:center;padding:16px 0}
.sum-emoji{font-size:3rem}
.sum-title{font-weight:700;font-size:1.1rem;margin-top:6px}
.sum-sub{color:var(--muted);font-size:.88rem;margin-top:2px}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);font-size:.9rem}
.sum-row:last-child{border-bottom:none}
.sum-row.ttl{font-weight:700;font-size:.95rem}
.pos{color:var(--gd)}
.neg{color:var(--r)}

/* CHART */
.chart{display:flex;align-items:flex-end;gap:4px;height:56px;padding-bottom:0}
.chart-bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.chart-fill{width:100%;border-radius:3px 3px 0 0;min-height:3px;transition:height .3s}
.chart-lbl{font-size:.65rem;color:var(--muted)}

/* SETUP */
.setup{text-align:center;padding:20px 0}
.game-title{font-size:2.8rem;font-weight:800;color:var(--yd);letter-spacing:-1px;margin-bottom:4px}
.game-sub{color:var(--muted);font-size:1rem;margin-bottom:24px}
.loc-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px}
.loc-card{background:var(--card);border:3px solid var(--border);border-radius:12px;padding:18px 14px;cursor:pointer;transition:all .18s;text-align:left}
.loc-card:hover{border-color:var(--y);background:var(--yl)}
.loc-card.sel{border-color:var(--y);background:var(--yl)}
.loc-icon{font-size:2.2rem;margin-bottom:8px}
.loc-name{font-weight:700;font-size:1rem;margin-bottom:4px}
.loc-desc{font-size:.82rem;color:var(--muted);line-height:1.4}
.loc-trait{font-size:.78rem;color:var(--muted);margin-top:3px}

/* ALERTS */
.alert{padding:9px 13px;border-radius:8px;margin-bottom:10px;font-size:.85rem}
.alert-w{background:#FFF3E0;border:1px solid #FFB74D;color:#E65100}
.alert-s{background:#E8F5E9;border:1px solid #66BB6A;color:#1B5E20}
.alert-i{background:#E3F2FD;border:1px solid #42A5F5;color:#0D47A1}

/* GAME OVER */
.go{text-align:center;padding:32px 0}
.go-title{font-size:2.4rem;font-weight:800;color:var(--r);margin-bottom:8px}

/* FADE */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.fade{animation:fadeUp .28s ease}

/* RULES */
.rules p{font-size:.85rem;color:#555;line-height:1.65;margin-bottom:3px}

@media(max-width:480px){
  .grid2,.loc-cards{grid-template-columns:1fr}
  .game-title{font-size:2rem}
  .hdr-stats{gap:5px}
  .stat{font-size:.78rem;padding:2px 8px}
}
</style>
</head>
<body>
<div id="app"></div>
<script type="module">
import { PRICES, EXPIRY, CUPS_PER_PITCHER, START_MONEY, REP_START,
         WEATHERS, WX_WEIGHTS, LOCS, AD_TIERS, BULK_BREAKS,
         G, resetState,
         supplyPrice, maxQtyAffordable, bulkLabel, fmt, clamp, rng,
         invTotal, maxCups, expireInv, useIngredients, buyItem,
         pickWeather, makeForecast, simulateDay,
         repLabel, repColor, repMult, brandBoost, brandElasReduct,
         recipeQuality, demandBadge, priceHint, fxQuote, sumEmoji, sumTitle,
         pendingCost, getAdTiers, cupsAfterBuy, cupsAfterBuyNoIce
       } from './game.js';

// ── UTILS ─────────────────────────────────────────────────────
const $  = id => document.getElementById(id);

// ── RENDERERS ────────────────────────────────────────────────
let forecastOpen = false;
let debugMode = false;
function renderSetup(){
  const locCards = Object.values(LOCS).map(l=>`
    <div class="loc-card${G.loc===l.id?' sel':''}" onclick="selectLoc('${l.id}')">
      <div class="loc-icon">${l.icon}</div>
      <div class="loc-name">${l.name}</div>
      <div class="loc-desc">${l.desc}</div>
      ${l.traits.map(t=>`<div class="loc-trait">✓ ${t}</div>`).join('')}
    </div>`).join('');

  return `<div class="setup">
    <div class="game-title">🍋 Lemonade Stand</div>
    <p class="game-sub">Start your empire, one cup at a time</p>
    <div class="card">
      <div class="card-title">📍 Choose Your Location</div>
      <div class="loc-cards">${locCards}</div>
    </div>
    <div class="card rules">
      <div class="card-title">📋 How to Play</div>
      <p>• Each morning check the <strong>weather forecast</strong> and buy ingredients for the day</p>
      <p>• <strong>Ice</strong> melts overnight — buy fresh daily &nbsp;|&nbsp; <strong>Lemons</strong> last a week &nbsp;|&nbsp; <strong>Sugar</strong> lasts months</p>
      <p>• Hot days = lots of thirsty customers. Cold or stormy = stay home and save your supplies</p>
      <p>• Set your price wisely — too high and customers walk. You start with <strong>${fmt(START_MONEY)}</strong></p>
      <p>• Choose an <strong>advertising</strong> option each day — from a friend with a sign to a Super Bowl commercial</p>
      <p>• If you go broke and have no supplies left, the game is over!</p>
    </div>
    <button class="btn btn-y btn-full" onclick="startGame()"
      ${!G.loc?'disabled':''} style="font-size:1.1rem">
      ${G.loc?'Start Game →':'Select a location first'}
    </button>
    <div style="margin-top:12px;text-align:center">
      <button class="btn btn-w" onclick="toggleDebug()" style="font-size:.78rem;padding:5px 14px;opacity:.5">
        ${debugMode?'🛠 Debug: ON':'🛠 Debug mode'}
      </button>
    </div>
  </div>`;
}

function renderHeader(){
  const rc = repColor(G.rep);
  return `<div class="hdr">
    <div class="hdr-title">🍋 Lemonade Stand</div>
    <div class="hdr-stats">
      <div class="stat">Day ${G.day}</div>
      <div class="stat">${fmt(G.money)}</div>
      <div class="stat"><span style="color:${rc}">★</span> <span style="color:${rc};font-weight:700">${G.rep}</span> <span style="color:var(--muted);font-weight:400;font-size:.75rem">${repLabel(G.rep)}</span></div>
      <div class="stat">${LOCS[G.loc].icon} ${LOCS[G.loc].name}</div>
    </div>
  </div>`;
}

function renderInvRows(){
  const items=[
    {t:'lemon',icon:'🍋',name:'Lemons'},
    {t:'sugar',icon:'🍬',name:'Sugar'},
    {t:'ice',  icon:'🧊',name:'Ice'},
  ];
  return items.map(({t,icon,name})=>{
    const total=invTotal(t);
    if(total===0) return `<div class="inv-row"><span>${icon}</span><span class="inv-qty">0</span><span style="color:#bbb">${name} — none</span></div>`;

    const batches=G.inv[t];
    const multi=batches.length>1;

    function batchRow(b, extraClass=''){
      const dl=b.exp-G.day;
      const cls=dl<=1?'exp-crit':dl<=3?'exp-warn':'';
      const txt=dl<=1?'expires TODAY!':`expires in ${dl}d`;
      return `<div class="inv-row ${extraClass}"><span>${extraClass?'↳':icon}</span><span class="inv-qty">${b.qty}</span><span>${name}</span><span class="inv-exp ${cls}">${txt}</span></div>`;
    }

    if(!multi) return batchRow(batches[0]);

    // Multiple batches: bold total header + indented per-batch rows
    const totalRow=`<div class="inv-row inv-total-row"><span>${icon}</span><span class="inv-qty">${total}</span><span>${name} <span style="font-weight:400;color:var(--muted);font-size:.8rem">total</span></span></div>`;
    return totalRow + batches.map(b=>batchRow(b,'inv-batch-row')).join('');
  }).join('');
}

function renderRecipe(){
  const {lemons: L, sugar: S} = G.recipe;
  const q = recipeQuality();
  const costPerCup = (L * PRICES.lemon + S * PRICES.sugar) / CUPS_PER_PITCHER;
  return `<div class="card">
    <div class="card-title">🧪 Recipe <span style="font-weight:400;font-size:.8rem;color:var(--muted)">per pitcher → ${CUPS_PER_PITCHER} cups</span></div>
    <div class="recipe-row">
      <div class="recipe-ing">
        <span class="recipe-icon">🍋</span>
        <div class="recipe-ctrl">
          <button class="qbtn" onclick="adjRecipe('lemons',-1)">−</button>
          <span class="recipe-num">${L}</span>
          <button class="qbtn" onclick="adjRecipe('lemons',1)">+</button>
        </div>
        <div class="recipe-lbl">${L===1?'lemon':'lemons'}</div>
      </div>
      <span class="recipe-sep">+</span>
      <div class="recipe-ing">
        <span class="recipe-icon">🍬</span>
        <div class="recipe-ctrl">
          <button class="qbtn" onclick="adjRecipe('sugar',-1)">−</button>
          <span class="recipe-num">${S}</span>
          <button class="qbtn" onclick="adjRecipe('sugar',1)">+</button>
        </div>
        <div class="recipe-lbl">${S===1?'cup sugar':'cups sugar'}</div>
      </div>
      <span class="recipe-sep">→</span>
      <div class="recipe-ing">
        <span class="recipe-icon">🥤</span>
        <div style="font-size:1.3rem;font-weight:800;color:var(--yd);line-height:1">${CUPS_PER_PITCHER}</div>
        <div class="recipe-lbl">cups</div>
      </div>
    </div>
    <div class="recipe-quality">
      <span>
        <strong style="color:${q.color}">${q.label}</strong>
        <span style="font-size:.78rem;color:var(--muted);margin-left:6px">${q.feedback}</span>
      </span>
      <span style="font-size:.82rem;color:var(--muted);flex-shrink:0">~${fmt(costPerCup)}/cup</span>
    </div>
  </div>`;
}

function renderShop(){
  const expiries = {lemon:'7 days', sugar:'months', ice:'overnight!'};
  return ['lemon','sugar','ice'].map(t=>{
    const icons={lemon:'🍋',sugar:'🍬',ice:'🧊'};
    const names={lemon:'Lemons',sugar:'Sugar',ice:'Ice (serving)'};
    const recipeHint = t==='lemon' ? ` · ${G.recipe.lemons}/pitcher`
                     : t==='sugar' ? ` · ${G.recipe.sugar}/pitcher` : '';
    const qty = G.pending[t];
    const price = supplyPrice(t, qty);
    const bulk = bulkLabel(qty);
    const priceStr = qty>0 ? `$${price.toFixed(3)} each` : `$${PRICES[t].toFixed(2)} each`;
    const discBadge = bulk.pct>0
      ? `<span class="bulk-badge">-${bulk.pct}% bulk</span>`
      : bulk.next ? `<span style="color:#bbb;font-size:.72rem">buy ${bulk.next.min}+ for ${bulk.next.pct}% off</span>` : '';
    return `<div class="ing-row">
      <div class="ing-header">
        <div class="ing-icon">${icons[t]}</div>
        <div class="ing-info">
          <div class="ing-name">${names[t]}</div>
          <div class="ing-detail">${priceStr}${recipeHint} · lasts ${expiries[t]} &nbsp;${discBadge}</div>
        </div>
      </div>
      <div class="ing-ctrl">
        <button class="qbtn qbtn-reset" onclick="resetItem('${t}')" title="Reset to 0">↺</button>
        <button class="qbtn" onclick="adj('${t}',-1)">−</button>
        <input class="qty-inp" type="number" min="0" value="${qty}"
          onchange="setQty('${t}',this.value)">
        <button class="qbtn" onclick="adj('${t}',1)">+</button>
        <button class="qbtn" onclick="adj('${t}',100)">+100</button>
        <button class="qbtn" onclick="adj('${t}',1000)">+1k</button>
      </div>
    </div>`;
  }).join('');
}

function renderPlanning(){
  const cost=pendingCost(), afford=G.money-cost, cups=cupsAfterBuy(), cupsPlain=cupsAfterBuyNoIce();
  const wx=G.weather, fx=G.forecastWeather;

  // Expiry warnings
  const warns=[];
  G.inv.lemon.forEach(b=>{ const d=b.exp-G.day; if(d<=2) warns.push(`⚠️ ${b.qty} lemon(s) expire in ${d} day(s)!`); });

  return `<div>
    ${renderHeader()}

    ${debugMode?`<div style="background:#1a1a1a;border-radius:10px;padding:10px 14px;margin-bottom:14px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <span style="color:#aaa;font-size:.8rem;font-weight:700;margin-right:4px">🛠 DEBUG</span>
      ${[10,100,1000,10000,1000000].map(n=>`<button class="btn" onclick="cheatMoney(${n})" style="background:#333;color:#fff;padding:5px 12px;font-size:.82rem">+$${n.toLocaleString()}</button>`).join('')}
      <button class="btn" onclick="toggleDebug()" style="background:#444;color:#aaa;padding:5px 12px;font-size:.78rem;margin-left:auto">✕ close</button>
    </div>`:''}

    ${warns.length?`<div class="alert alert-w">${warns.join('<br>')}</div>`:''}

    <div class="grid2">
      <div class="card">
        <div class="card-title">☀️ Today</div>
        <div class="wx-card">
          <div class="wx-icon">${wx.icon}</div>
          <div class="wx-name">${wx.name}</div>
          <div class="wx-temp">${wx.temp}</div>
          <div class="wx-desc">${wx.desc}</div>
          <div style="margin-top:6px">${demandBadge(wx.demand)}</div>
        </div>
      </div>
      <div class="card" style="cursor:pointer" onclick="toggleForecast()">
        <div class="card-title" style="justify-content:space-between;margin-bottom:${forecastOpen?'12px':'0'}">
          <span>🔮 Tomorrow's Forecast</span>
          <span style="font-size:.8rem;color:var(--muted);font-weight:400">${forecastOpen?'▲ hide':'▼ show'}</span>
        </div>
        ${forecastOpen?`<div class="wx-card" style="opacity:.85">
          <div class="wx-icon">${fx.icon}</div>
          <div class="wx-name">${fx.name}</div>
          <div class="wx-temp">${fx.temp}</div>
          <div class="wx-desc" style="font-style:italic">"${fxQuote(fx)}"</div>
          <div style="font-size:.72rem;color:#bbb;margin-top:4px">May not be 100% accurate</div>
        </div>`:''}
      </div>
    </div>

    <div class="card">
      <div class="card-title">📦 Current Inventory</div>
      ${renderInvRows()}
    </div>

    ${renderRecipe()}

    <div class="card">
      <div class="card-title">🛒 Buy Supplies</div>
      ${renderShop()}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:.88rem">
        <span style="color:var(--muted)">Purchase total: <strong style="color:${cost>0?'var(--r)':'inherit'}">${fmt(cost)}</strong></span>
        <span style="color:var(--muted)">After: <strong>${fmt(afford)}</strong></span>
      </div>
    </div>

    <div class="cups-box">
      <div class="cups-lbl" style="margin-bottom:10px">cups you can make today</div>
      <div style="display:flex;justify-content:center;align-items:stretch;gap:0">
        <div style="flex:1;text-align:center;padding:0 12px">
          <div class="cups-num">${cups}</div>
          <div class="cups-lbl" style="margin-top:4px">🧊 with ice</div>
        </div>
        <div style="width:1px;background:var(--y);opacity:.4"></div>
        <div style="flex:1;text-align:center;padding:0 12px">
          <div class="cups-num" style="color:${cupsPlain>0?'#888':'var(--yd)'}">${cupsPlain}</div>
          <div class="cups-lbl" style="margin-top:4px">without ice</div>
        </div>
      </div>
      ${cupsPlain===0?'<div style="color:var(--r);font-size:.82rem;margin-top:8px">Buy lemons &amp; sugar to open!</div>':''}
    </div>

    <div class="card">
      <div class="card-title">📣 Advertising</div>
      <div class="ad-list">
        ${AD_TIERS.map(t=>{
          const sel = G.adTiers.includes(t.id);
          const currentAdCost = getAdTiers().cost;
          const supCost = pendingCost() - currentAdCost;
          const locked = !sel && t.cost > G.money - supCost - currentAdCost;
          const boostTxt = t.mult>1 ? `+${Math.round((t.mult-1)*100)}% customers` : 'No boost';
          const repTxt   = t.repBonus>0 ? `★ +${t.repBonus} rep/day` : '';
          const costTxt  = t.cost===0 ? 'Free' : t.cost>=1000 ? '$'+t.cost.toLocaleString() : '$'+t.cost;
          return `<div class="ad-row${sel?' ad-sel':''}${locked?' ad-locked':''}" onclick="selectAdTier('${t.id}')">
            <div class="ad-dot">${sel?'✓':''}</div>
            <div class="ad-icon">${t.icon}</div>
            <div class="ad-info">
              <div class="ad-name">${t.name}</div>
              <div class="ad-desc">${t.desc}</div>
            </div>
            <div class="ad-right">
              <div class="ad-cost">${costTxt}</div>
              <div class="ad-boost">${boostTxt}</div>
              ${repTxt?`<div style="font-size:.72rem;color:#c8a840">${repTxt}</div>`:''}
            </div>
          </div>`;
        }).join('')}
      </div>
      ${(()=>{const a=getAdTiers();return a.tiers.length>1?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:.82rem;display:flex;justify-content:space-between"><span style="color:var(--muted)">${a.tiers.length} ads combined</span><span><strong>+${Math.round((a.mult-1)*100)}%</strong> reach · <strong class="neg">-${a.cost>=1000?'$'+a.cost.toLocaleString():fmt(a.cost)}</strong> total</span></div>`:''})()}
    </div>

    <div class="card">
      <div class="card-title">💰 Set Your Price</div>
      <div class="price-row">
        <span style="font-weight:700;font-size:1.1rem">$</span>
        <input class="price-inp" id="priceInp" type="number" min=".10" max="9.99" step=".05"
          value="${G.price.toFixed(2)}" onchange="setPrice(this.value)">
        <div class="price-hint">${priceHint(G.price,wx)}</div>
      </div>
      <div class="quick-prices">
        ${[0.50,0.75,1.00,1.25,1.50].map(p=>`
          <button class="btn ${Math.abs(G.price-p)<.01?'btn-y':'btn-w'}" onclick="quickPrice(${p})">${fmt(p)}</button>`).join('')}
      </div>
      ${G.rep>=100?`<div style="margin-top:8px;font-size:.78rem;color:#c8a840">★ Brand recognition: sweet spot up to <strong>${fmt(0.70+wx.demand*0.25+Math.max(0,brandBoost(G.rep)))}</strong> · price sensitivity reduced ${Math.round(Math.max(0,brandElasReduct(G.rep))*100)}%</div>`:''}
    </div>

    <button class="btn btn-g btn-full" onclick="openStand()" ${cost>G.money?'disabled':''}>
      🍋 Open for Business!
    </button>
  </div>`;
}

function renderSimulation(){
  return `<div>
    ${renderHeader()}
    <div class="card sim-wrap">
      <div class="sim-title">🍋 Stand is Open!</div>
      <div style="color:var(--muted);font-size:.9rem">${G.weather.icon} ${G.weather.name} · ${LOCS[G.loc].name}</div>
      <div class="prog-bar"><div class="prog-fill" id="pf" style="width:0%"></div></div>
      <div class="sim-time" id="st">Morning...</div>
      <div class="sim-count" id="sc">0</div>
      <div style="color:var(--muted);font-size:.88rem">cups sold</div>
      <div class="sim-msg" id="sm"></div>
    </div>
  </div>`;
}

function renderInventoryRemaining(){
  const tl=invTotal('lemon'),ts=invTotal('sugar'),ti=invTotal('ice');
  const expWarn=[];
  G.inv.lemon.forEach(b=>{ const d=b.exp-G.day; if(d<=2) expWarn.push(`${b.qty} lemon(s) in ${d}d`); });
  return `<div class="card">
    <div class="card-title">📦 Remaining Inventory</div>
    <div class="grid3" style="text-align:center">
      ${[['🍋',tl,'Lemons'],['🍬',ts,'Sugar'],['🧊',ti,'Ice (melts!)']].map(([ic,q,nm])=>`
        <div style="padding:10px;background:var(--yl);border-radius:8px">
          <div style="font-size:1.6rem">${ic}</div>
          <div style="font-weight:700;font-size:1.2rem">${q}</div>
          <div style="font-size:.78rem;color:var(--muted)">${nm}</div>
        </div>`).join('')}
    </div>
    ${expWarn.length?`<div class="alert alert-w" style="margin-top:10px;margin-bottom:0">⚠️ Expiring soon: ${expWarn.join(', ')}</div>`:''}
  </div>`;
}

function renderChart(){
  if(G.history.length<2) return '';
  const last=G.history.slice(-7);
  const maxR=Math.max(...last.map(h=>h.rev),0.01);
  const bars=last.map((h,i)=>{
    const pct=Math.round((h.rev/maxR)*100);
    const isLast=i===last.length-1;
    return `<div class="chart-bar">
      <div class="chart-fill" style="height:${pct}%;background:${isLast?'var(--y)':'#ccc'}"></div>
      <div class="chart-lbl">${h.wx.icon}</div>
    </div>`;
  }).join('');
  return `<div class="card">
    <div class="card-title">📈 Recent Revenue</div>
    <div class="chart">${bars}</div>
    <div style="font-size:.72rem;color:#bbb;text-align:center;margin-top:4px">Last ${last.length} days · yellow = today</div>
  </div>`;
}

function turnedAwayBreakdown(r){
  const parts=[];
  const price=r.pot-r.want, ice=r.iceTurnaway, sup=r.want-r.sold-r.iceTurnaway;
  if(price>0) parts.push(`${price} price`);
  if(ice>0)   parts.push(`${ice} no ice`);
  if(sup>0)   parts.push(`${sup} supplies`);
  return parts.length ? `(${parts.join(' · ')})` : '';
}

function renderSummary(){
  const r=G.result;
  return `<div>
    ${renderHeader()}
    <div class="card">
      <div class="card-title">📊 Day ${G.day-1} Summary</div>
      <div class="sum-hero">
        <div class="sum-emoji">${sumEmoji(r)}</div>
        <div class="sum-title">${sumTitle(r)}</div>
        <div class="sum-sub">${r.reaction}</div>
      </div>
      <div class="sum-row"><span>Weather</span><span>${r.wx.icon} ${r.wx.name} (${r.wx.temp})</span></div>
      <div class="sum-row"><span>Potential customers</span><span>${r.pot}</span></div>
      <div class="sum-row"><span>Cups sold</span><span><strong>${r.sold}</strong> × ${fmt(G.price)} = <span class="pos">${fmt(r.rev)}</span></span></div>
      ${r.pot>r.sold?`<div class="sum-row"><span style="color:var(--muted);font-size:.82rem;padding-left:8px">↳ turned away</span><span style="color:var(--o)">${r.pot-r.sold} ${turnedAwayBreakdown(r)}</span></div>`:''}
      <div class="sum-row"><span>🧪 Recipe taste</span><span style="color:${r.recipe.color}"><strong>${r.recipe.label}</strong> <span style="font-weight:400;font-size:.8rem">${r.recipe.feedback}</span></span></div>
      ${!r.hasIce&&r.wx.iceWant>=1?`<div class="sum-row"><span style="color:var(--o)">No ice on a warm day</span><span style="color:var(--o)">Lost some customers</span></div>`:''}
      ${r.adTiers.tiers.map(t=>`<div class="sum-row"><span>${t.icon} ${t.name}</span><span class="neg">-${t.cost>=1000?'$'+t.cost.toLocaleString():fmt(t.cost)} <span style="color:var(--muted);font-weight:400">(+${Math.round((t.mult-1)*100)}% reach)</span></span></div>`).join('')}
      <div class="sum-row"><span>Supplies bought</span><span class="neg">-${fmt(r.exp-r.adTiers.cost)}</span></div>
      <div class="sum-row ttl"><span>Net today</span><span class="${r.net>=0?'pos':'neg'}">${r.net>=0?'+':''}${fmt(r.net)}</span></div>
      <div class="sum-row ttl"><span>Balance</span><span>${fmt(G.money)}</span></div>
      <div class="sum-row" style="margin-top:6px;padding-top:8px;border-top:1px solid var(--border)">
        <span>★ Reputation</span>
        <span>
          <span style="color:${repColor(r.repBefore)};font-weight:700">${r.repBefore}</span>
          <span style="color:var(--muted);font-size:.8rem"> → </span>
          <span style="color:${repColor(r.repAfter)};font-weight:700">${r.repAfter}</span>
          <span class="${r.repDelta>=0?'pos':'neg'}" style="font-size:.82rem;margin-left:4px">(${r.repDelta>=0?'+':''}${r.repDelta})</span>
          <span style="color:var(--muted);font-size:.78rem;margin-left:4px">${repLabel(r.repAfter)}</span>
        </span>
      </div>
    </div>
    ${renderInventoryRemaining()}
    ${renderChart()}
    <button class="btn btn-y btn-full" onclick="nextDay()">Day ${G.day} →</button>
  </div>`;
}

function renderGameOver(){
  const days=G.day-1;
  const totRev=G.history.reduce((s,h)=>s+h.rev,0);
  const best=G.history.reduce((b,h)=>h.sold>b.sold?h:b,{sold:0,wx:{icon:'',name:''}});
  return `<div class="go">
    <div class="go-title">💸 Bankrupt!</div>
    <p style="color:var(--muted);margin-bottom:24px">You ran out of money and supplies.</p>
    <div class="card">
      <div class="card-title">📊 Final Stats</div>
      <div class="sum-row"><span>Days survived</span><span><strong>${days}</strong></span></div>
      <div class="sum-row"><span>Total revenue</span><span>${fmt(totRev)}</span></div>
      <div class="sum-row"><span>Best day</span><span>${best.sold} cups ${best.wx.icon?`(${best.wx.icon} ${best.wx.name})`:'sold'}</span></div>
      <div class="sum-row"><span>★ Final reputation</span><span style="color:${repColor(G.rep)};font-weight:700">${G.rep} — ${repLabel(G.rep)}</span></div>
      <div class="sum-row"><span>Location</span><span>${LOCS[G.loc].icon} ${LOCS[G.loc].name}</span></div>
    </div>
    <button class="btn btn-y btn-full" onclick="resetGame()">🍋 Try Again</button>
  </div>`;
}

// ── EVENT HANDLERS ───────────────────────────────────────────
function selectLoc(id){ G.loc=id; render(); }

function startGame(){
  if(!G.loc) return;
  G.weather    = pickWeather();
  G.nextWeather= pickWeather();
  G.forecastWeather = makeForecast(G.nextWeather);
  G.screen='planning'; render();
}

function adj(t, delta){
  const otherCost = pendingCost() - supplyPrice(t,G.pending[t])*G.pending[t];
  const budget = G.money - otherCost;
  const newQ = Math.max(0, G.pending[t]+delta);
  G.pending[t] = Math.min(newQ, maxQtyAffordable(t, budget));
  render();
}

function setQty(t, val){
  const otherCost = pendingCost() - supplyPrice(t,G.pending[t])*G.pending[t];
  const budget = G.money - otherCost;
  const newQ = Math.max(0, parseInt(val)||0);
  G.pending[t] = Math.min(newQ, maxQtyAffordable(t, budget));
  render();
}

function resetItem(t){ G.pending[t]=0; render(); }
function adjRecipe(type, delta){ G.recipe[type] = clamp(G.recipe[type]+delta, 1, 8); render(); }

function toggleForecast(){ forecastOpen=!forecastOpen; render(); }
function toggleDebug(){ debugMode=!debugMode; render(); }
function cheatMoney(n){ G.money=Math.round((G.money+n)*100)/100; render(); }

function selectAdTier(id){
  const t = AD_TIERS.find(x=>x.id===id);
  if(!t) return;
  if(G.adTiers.includes(id)){
    G.adTiers = G.adTiers.filter(x=>x!==id);
  } else {
    const supCost = pendingCost() - getAdTiers().cost;
    if(t.cost > G.money - supCost - getAdTiers().cost) return;
    G.adTiers.push(id);
  }
  render();
}

function setPrice(v){
  G.price=clamp(parseFloat(v)||1,0.10,9.99);
  render();
}
function quickPrice(v){ G.price=v; render(); }

function openStand(){
  if(pendingCost()>G.money) return;
  G.spend=0;
  buyItem('lemon',G.pending.lemon);
  buyItem('sugar',G.pending.sugar);
  buyItem('ice',  G.pending.ice);
  // Deduct ad spend
  const adCost = getAdTiers().cost;
  if(adCost>0){
    G.money = Math.round((G.money-adCost)*100)/100;
    G.spend = Math.round((G.spend+adCost)*100)/100;
  }
  G.screen='simulation'; render();
  setTimeout(runSim, 80);
}

async function runSim(){
  const result = simulateDay();
  G.result = result;

  const times=['Morning...','Mid-morning...','Noon rush!','Afternoon...','Winding down...'];
  const msgs=['Customers starting to arrive...','Busy period!','Rush hour!','Slowing down...','Closing up for the day...'];
  const STEPS=60, DUR=3400, STEP_MS=DUR/STEPS;

  for(let i=0;i<=STEPS;i++){
    await new Promise(r=>setTimeout(r,STEP_MS));
    const pf=$('pf'), sc=$('sc'), st=$('st'), sm=$('sm');
    if(!pf) return;
    const pct=i/STEPS;
    pf.style.width=(pct*100)+'%';
    if(st) st.textContent=times[Math.min(4,Math.floor(pct*5))];
    if(sc) sc.textContent=Math.round(pct*result.sold);
    if(sm && i%12===0) sm.textContent=msgs[Math.min(4,Math.floor(pct*5))];
  }

  G.day++;
  expireInv();

  // Check game over
  const canMake = maxCups(false);
  const minBuy  = PRICES.lemon + PRICES.sugar; // cheapest cup without ice
  if(canMake===0 && G.money<minBuy){ G.screen='gameover'; render(); return; }

  await new Promise(r=>setTimeout(r,600));
  G.screen='summary'; render();
}

function nextDay(){
  // Advance weather
  G.weather = G.nextWeather;
  G.nextWeather = pickWeather();
  G.forecastWeather = makeForecast(G.nextWeather);
  G.spend=0; G.pending={lemon:0,sugar:0,ice:0}; G.adTiers=[]; forecastOpen=false;

  // Final game-over check
  const canMake=maxCups(false);
  const minBuy=PRICES.lemon+PRICES.sugar;
  if(canMake===0 && G.money<minBuy){ G.screen='gameover'; }
  else { G.screen='planning'; }
  render();
}

function resetGame(){
  resetState();
  render();
}

// ── MAIN RENDER ──────────────────────────────────────────────
let _prevScreen = null;
function render(){
  const app=document.getElementById('app');
  const screenChanged = G.screen !== _prevScreen;
  _prevScreen = G.screen;
  switch(G.screen){
    case 'setup':       app.innerHTML=renderSetup();      break;
    case 'planning':    app.innerHTML=renderPlanning();   break;
    case 'simulation':  app.innerHTML=renderSimulation(); break;
    case 'summary':     app.innerHTML=renderSummary();    break;
    case 'gameover':    app.innerHTML=renderGameOver();   break;
  }
  if(screenChanged){
    window.scrollTo(0,0);
    if(app.firstElementChild) app.firstElementChild.classList.add('fade');
  }
}

// Expose event handlers to global scope for inline onclick attributes
Object.assign(window, {
  selectLoc, startGame, adj, setQty, resetItem, adjRecipe,
  toggleForecast, toggleDebug, cheatMoney, selectAdTier,
  setPrice, quickPrice, openStand, nextDay, resetGame
});

render();
</script>
</body>
</html>
